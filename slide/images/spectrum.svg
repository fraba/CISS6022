<svg width="1000" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradient for the spectrum background -->
  <defs>
    <linearGradient id="spectrumGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FF9800;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#F44336;stop-opacity:0.3" />
    </linearGradient>

    <marker id="arrowhead" markerWidth="10" markerHeight="10"
            refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Background rectangle with gradient -->
  <rect x="50" y="80" width="900" height="80" fill="url(#spectrumGradient)"
        stroke="#333" stroke-width="2" rx="5"/>

  <!-- Arrow showing direction -->
  <line x1="50" y1="200" x2="950" y2="200"
        stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Vertical dividing lines -->
  <line x1="350" y1="80" x2="350" y2="160" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="650" y1="80" x2="650" y2="160" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Section labels (top) -->
  <text x="200" y="60" font-family="Arial, sans-serif" font-size="20"
        font-weight="bold" text-anchor="middle" fill="#4CAF50">
    Technological Routine
  </text>

  <text x="500" y="60" font-family="Arial, sans-serif" font-size="20"
        font-weight="bold" text-anchor="middle" fill="#FF9800">
    Political Governance
  </text>

  <text x="800" y="60" font-family="Arial, sans-serif" font-size="20"
        font-weight="bold" text-anchor="middle" fill="#F44336">
    High-Level Securitisation
  </text>

  <!-- Examples (inside boxes) -->
  <text x="200" y="110" font-family="Arial, sans-serif" font-size="16"
        text-anchor="middle" fill="#333">
    Patching software
  </text>
  <text x="200" y="135" font-family="Arial, sans-serif" font-size="14"
        text-anchor="middle" fill="#555">
    IT departments
  </text>

  <text x="500" y="110" font-family="Arial, sans-serif" font-size="16"
        text-anchor="middle" fill="#333">
    Standard-setting
  </text>
  <text x="500" y="135" font-family="Arial, sans-serif" font-size="14"
        text-anchor="middle" fill="#555">
    Regulatory bodies
  </text>

  <text x="800" y="110" font-family="Arial, sans-serif" font-size="16"
        text-anchor="middle" fill="#333">
    National security
  </text>
  <text x="800" y="135" font-family="Arial, sans-serif" font-size="14"
        text-anchor="middle" fill="#555">
    Military/Intelligence
  </text>

  <!-- Bottom labels -->
  <text x="50" y="230" font-family="Arial, sans-serif" font-size="16"
        font-style="italic" fill="#333">
    Low political salience
  </text>

  <text x="950" y="230" font-family="Arial, sans-serif" font-size="16"
        font-style="italic" text-anchor="end" fill="#333">
    High political salience
  </text>

  <!-- Central message -->
  <text x="500" y="270" font-family="Arial, sans-serif" font-size="18"
        font-weight="bold" text-anchor="middle" fill="#d32f2f">
    ← Same technical issue can be positioned anywhere along this spectrum →
  </text>
</svg>
